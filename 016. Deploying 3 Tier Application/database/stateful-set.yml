apiVersion: apps/v1
kind: StatefulSet 
metadata: 
  name: rexa-mongo 
  labels: 
    app: rexa-mongo-label
spec: 
  serviceName: rexa-headless-service 
  replicas: 1
  selector: 
    matchLabels:
      app: rexa-mongo
  template: 
    metadata: 
      labels: 
        app: rexa-mongo 
    spec: 
      containers:
        - name: rexa-mongo-container 
          image: mongo 
          ports: 
            - containerPort: 27017
          env: 
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: password 
            - name: MONGO_INITDB_ROOT_USERNAME
              value: ameer 
          volumeMounts: 
            - name: rexa-mongo-data 
              mountPath: /var/lib/mongo
  volumeClaimTemplates: 
    - metadata: 
        name: rexa-mongo-data
      spec: 
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Mi