apiVersion: apps/v1
kind: Deployment 
metadata: 
  name: rexa-backend-deployment
  labels: 
    app: rexa-backend-deployment-label
spec: 
  replicas: 1
  selector: 
    matchLabels:
      app: rexa-backend 
  template:
    metadata: 
      labels: 
        app: rexa-backend
    spec:
      containers:
        - name: rexa-backend-container
          image: itisameerkhan/rexa-backend:v4
          imagePullPolicy: Always
          ports: 
            - containerPort: 8080
          env: 
            - name: PORT 
              value: "8080"
            - name: MONGO_URI
              value: "mongodb://ameer:password@rexa-headless-service:27017/rexa?authSource=admin"
            - name: MONGO_INITDB_ROOT_USERNAME
              value: ameer
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: password
            - name: SECRET 
              value: this-secret-coming-from-deployment-kube
